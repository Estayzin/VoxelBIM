<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte IFC — Carlos Estay Ruggieri</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1f35; --blue:#1a3a5c; --accent:#2196f3; --green:#2e7d32;
  --bg:#f0f4f8; --card:#fff; --text:#1a2433; --muted:#6b7a8d; --border:#dde3ea;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }

/* HEADER */
header { background:var(--navy); padding:13px 24px; display:flex; align-items:center; gap:14px; border-bottom:3px solid var(--accent); flex-shrink:0; }
.hicon { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
header h1 { font-size:15px; font-weight:700; color:#fff; letter-spacing:-.3px; }
header p  { font-size:11px; color:#8aabcc; margin-top:2px; font-weight:300; }

/* WORKSPACE */
.workspace { display:flex; flex:1; overflow:hidden; }

/* PANEL IZQUIERDO */
.panel-left { width:300px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); overflow-y:auto; }
.pl { padding:16px; display:flex; flex-direction:column; gap:12px; }

.drop { border:2px dashed var(--border); border-radius:12px; padding:24px 16px; text-align:center; cursor:pointer; transition:all .2s; background:var(--card); }
.drop:hover, .drop.over { border-color:var(--accent); background:#f0f7ff; box-shadow:0 0 0 3px rgba(33,150,243,.1); }
.drop-icon { font-size:30px; margin-bottom:8px; }
.drop h2 { font-size:13px; font-weight:600; color:var(--blue); }
.drop p  { font-size:11px; color:var(--muted); margin-top:4px; }
.drop input { display:none; }
.btn-sel { display:inline-block; margin-top:11px; padding:7px 16px; background:var(--accent); color:#fff; border:none; border-radius:7px; font:600 12px var(--sans); cursor:pointer; transition:background .15s; }
.btn-sel:hover { background:#1565c0; }

.finfo { display:none; background:var(--card); border-radius:9px; padding:10px 13px; border-left:4px solid var(--accent); box-shadow:0 1px 5px rgba(0,0,0,.07); align-items:center; gap:10px; }
.finfo.show { display:flex; }
.fname { font:600 11px var(--mono); color:var(--blue); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fmeta { font-size:11px; color:var(--muted); margin-top:2px; }

.btn-gen { width:100%; padding:11px; background:var(--green); color:#fff; border:none; border-radius:9px; font:700 13px var(--sans); cursor:pointer; transition:background .15s, transform .1s, box-shadow .15s; }
.btn-gen:hover:not(:disabled) { background:#1b5e20; transform:translateY(-1px); box-shadow:0 4px 14px rgba(46,125,50,.3); }
.btn-gen:disabled { background:#b0bec5; cursor:not-allowed; }

.sbox { display:none; background:var(--navy); border-radius:9px; overflow:hidden; }
.sbox.show { display:block; }
.shdr { padding:8px 13px; background:rgba(255,255,255,.05); font:600 10px var(--mono); color:#8aabcc; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.slog { padding:8px 13px; font:400 11px var(--mono); color:#a8c8e8; max-height:110px; overflow-y:auto; line-height:1.8; }
.log-ok{color:#69f0ae} .log-warn{color:#ffd740} .log-error{color:#ff5252} .log-info{color:#64b5f6}
.spin { width:11px; height:11px; border:2px solid rgba(138,171,204,.3); border-top-color:#8aabcc; border-radius:50%; animation:spin .8s linear infinite; display:none; }
.spin.show { display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.pwrap { height:3px; background:rgba(255,255,255,.08); display:none; }
.pwrap.show { display:block; }
.pbar { height:100%; background:linear-gradient(90deg,var(--accent),#00bcd4); width:0%; transition:width .3s ease; }

.res { display:none; }
.res.show { display:block; }
.res-hdr { font:700 10px var(--sans); text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:7px; }
.rcard { background:var(--card); border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:6px; display:flex; align-items:stretch; cursor:pointer; transition:box-shadow .15s, transform .1s; border:2px solid transparent; }
.rcard:hover { box-shadow:0 3px 10px rgba(0,0,0,.12); transform:translateY(-1px); }
.rcard.active { border-color:var(--accent); box-shadow:0 0 0 3px rgba(33,150,243,.15); }
.racc { width:4px; align-self:stretch; background:var(--accent); flex-shrink:0; }
.rbody { padding:9px 12px; flex:1; min-width:0; }
.rname { font:600 13px var(--sans); color:var(--blue); }
.rmeta { font:400 11px var(--mono); color:var(--muted); margin-top:2px; }

/* PANEL DERECHO */
.panel-right { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
.vempty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:10px; background:#f8fafc; }
.vempty .eicon { font-size:50px; opacity:.2; }
.vempty p { font-size:13px; }

/* Contenedor de vistas — siempre flex:1, cambia dirección en split */
.view-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.view-content.split-mode { flex-direction:row; }

/* TOOLBAR CON TOGGLE */
.vtoolbar { display:none; padding:8px 14px; background:var(--navy); align-items:center; gap:10px; flex-shrink:0; border-bottom:2px solid var(--accent); }
.vtoolbar.show { display:flex; }
.vt-title { font:600 13px var(--sans); color:#fff; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.btn-vdl { padding:6px 13px; background:var(--accent); color:#fff; border:none; border-radius:7px; font:600 12px var(--sans); cursor:pointer; transition:background .15s; flex-shrink:0; }
.btn-vdl:hover { background:#1565c0; }

/* Toggle reporte/3D */
.view-toggle { display:flex; background:rgba(255,255,255,.1); border-radius:8px; padding:3px; gap:2px; flex-shrink:0; }
.vt-btn { padding:5px 13px; border:none; border-radius:6px; font:600 11px var(--sans); cursor:pointer; transition:all .15s; background:transparent; color:rgba(255,255,255,.6); }
.vt-btn.active { background:#fff; color:var(--navy); }
.vt-btn:hover:not(.active) { color:#fff; background:rgba(255,255,255,.15); }

.vframe { flex:1; border:none; width:100%; display:none; }
.vframe.show { display:block; }
.vframe.split { width:50%; height:100%; flex:none; border-right:2px solid var(--accent); }

/* Canvas 3D */
#canvas3d { flex:1; width:100%; display:none; background:#1a1a2e; }
#canvas3d.show { display:block; }
#canvas3d.split { width:50%; height:100%; flex:none; }

/* Overlay de estado del visor 3D */
#viewer-overlay {
  position:absolute; bottom:16px; right:16px;
  background:rgba(13,31,53,.85); color:#8aabcc;
  font:600 11px var(--mono); padding:8px 14px; border-radius:8px;
  pointer-events:none; display:none; z-index:10;
  backdrop-filter:blur(4px);
}
.panel-right { position:relative; }

/* pasos de configuracion */
.step-label{font:700 10px var(--sans);text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.sel-esp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font:600 13px var(--sans);color:var(--blue);background:var(--card);cursor:pointer;outline:none;}
.sel-esp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(33,150,243,.1);}
.ents-toolbar{display:flex;gap:6px;margin-bottom:8px;}
.btn-chk{padding:5px 12px;border:1.5px solid var(--border);border-radius:6px;font:600 11px var(--sans);color:var(--muted);background:var(--card);cursor:pointer;transition:all .15s;}
.btn-chk:hover{border-color:var(--accent);color:var(--accent);}
.ents-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;}
.ent-item{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--card);border-radius:7px;border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;user-select:none;}
.ent-item:hover{border-color:var(--accent);background:#f5f9ff;}
.ent-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.ent-name{font:600 12px var(--sans);color:var(--blue);}
.ent-cls{font:400 10px var(--mono);color:var(--muted);margin-top:1px;}
</style>
</head>
<body>

<header>
  <div class="hicon">&#127959;</div>
  <div>
    <h1>Reporte de Entidades IFC por Especialidad</h1>
    <p>Creado por Carlos Estay Ruggieri</p>
  </div>
</header>

<div class="workspace">

  <!-- PANEL IZQUIERDO -->
  <div class="panel-left">
    <div class="pl">

      <div class="step-label">1. Archivo IFC</div>
      <div class="drop" id="drop">
        <div class="drop-icon">&#128193;</div>
        <h2>Arrastra tu archivo IFC</h2>
        <p>o haz clic para seleccionarlo</p>
        <input type="file" id="fi" accept=".ifc">
        <label for="fi" class="btn-sel">Seleccionar .ifc</label>
      </div>
      <div class="finfo" id="finfo">
        <span style="font-size:20px;flex-shrink:0">&#128203;</span>
        <div style="min-width:0;flex:1">
          <div class="fname" id="fname">-</div>
          <div class="fmeta" id="fmeta">-</div>
        </div>
      </div>

      <div id="configBlock" style="display:none;flex-direction:column;gap:12px">
        <div>
          <div class="step-label">2. Especialidad</div>
          <select id="selEsp" class="sel-esp">
            <option value="">-- Selecciona especialidad --</option>
          </select>
        </div>
        <div id="entsBlock" style="display:none">
          <div class="step-label">3. Entidades a revisar</div>
          <div class="ents-toolbar">
            <button class="btn-chk" id="btnAll">Todas</button>
            <button class="btn-chk" id="btnNone">Ninguna</button>
          </div>
          <div class="ents-list" id="entsList"></div>
        </div>
        <button class="btn-gen" id="btnGen" disabled>&#9654;&nbsp; Generar Reporte</button>
      </div>

      <div class="sbox" id="sbox">
        <div class="shdr">
          <div class="spin" id="spin"></div>
          <span id="stitle">Procesando...</span>
        </div>
        <div class="pwrap" id="pwrap"><div class="pbar" id="pbar"></div></div>
        <div class="slog" id="slog"></div>
      </div>

      <div class="res" id="res">
        <div class="res-hdr">Reporte generado</div>
        <div id="rlist"></div>
      </div>

    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="panel-right">
    <div class="vempty" id="vempty">
      <div class="eicon">&#128196;</div>
      <p>Carga un archivo IFC y genera los reportes</p>
    </div>
    <div class="vtoolbar" id="vtoolbar">
      <span class="vt-title" id="vtitle">-</span>
      <!-- Toggle -->
      <div class="view-toggle" id="viewToggle">
        <button class="vt-btn active" id="btnModeReport" onclick="setMode('report')">&#128196; Reporte</button>
        <button class="vt-btn" id="btnModeBoth" onclick="setMode('both')">&#9707; Ambos</button>
        <button class="vt-btn" id="btnMode3D" onclick="setMode('3d')">&#9648; 3D</button>
      </div>
      <button class="btn-vdl" id="vbtnDl">&#11015;&nbsp; Descargar</button>
    </div>
    <div class="view-content" id="viewContent">
      <iframe class="vframe" id="vframe" src="about:blank"></iframe>
      <canvas id="canvas3d"></canvas>
    </div>
    <div id="viewer-overlay"></div>
  </div>

</div><!-- /workspace -->

var COD_PRIO = {SIT:1,VOL:1};

// ============================================================
// DETECCIÓN DE ESPECIALIDAD POR NOMBRE
// ============================================================
function detectarCodigo(nombre) {
  var upper = nombre.toUpperCase();
  var partes = upper.split(/[_\-\s\.]+/);
  for (var i=0; i<partes.length; i++) {
    for (var k in ESP) { if (ESP[k].cod === partes[i]) return ESP[k].cod; }
  }
  var prioCod = null;
  for (var k in ESP) {
    var cod = ESP[k].cod;
    if (upper.indexOf(cod) !== -1) {
      if (COD_PRIO[cod]) { prioCod = cod; break; }
      if (!prioCod) prioCod = cod;
    }
  }
  return prioCod;
}

// ============================================================
// PARSEO IFC — cuenta clases y guarda expressIDs por clase
// ============================================================
function parsearIFC(texto) {
  var conteo    = {};   // cls -> count
  var idsPorCls = {};   // cls -> [expressId, ...]  (solo PRODUCTOS)
  var instancias = {};  // id  -> {cls, pos}

  var re = /#(\d+)\s*=\s*(IFC[A-Z0-9]+)\s*\(/g, m;
  while ((m = re.exec(texto)) !== null) {
    var id = parseInt(m[1]), cls = m[2];
    instancias[m[1]] = {cls:cls, pos: m.index + m[0].length};
    if (PRODUCTOS[cls]) {
      conteo[cls] = (conteo[cls]||0) + 1;
      if (!idsPorCls[cls]) idsPorCls[cls] = [];
      idsPorCls[cls].push(id);
    }
  }
  return {conteo:conteo, instancias:instancias, idsPorCls:idsPorCls, texto:texto};
}

// ============================================================
// UTILIDADES ATRIBUTOS IFC
// ============================================================
function extraerRaw(texto, pos) {
  var depth=1, i=pos, out="";
  while (i<texto.length && depth>0) {
    var c=texto[i];
    if (c==="(") depth++;
    else if (c===")") { depth--; if(!depth) break; }
    out+=c; i++;
  }
  return out;
}
function splitAttrs(raw) {
  var attrs=[],depth=0,cur="";
  for (var i=0;i<raw.length;i++){
    var c=raw[i];
    if(c==="("||c==="["){depth++;cur+=c;}
    else if(c===")"||c==="]"){depth--;cur+=c;}
    else if(c===","&&depth===0){attrs.push(cur.trim());cur="";}
    else cur+=c;
  }
  if(cur.trim()) attrs.push(cur.trim());
  return attrs;
}
function strVal(a){
  if(!a||a==="$"||a==="*") return null;
  var m=a.match(/^'(.*)'$/); return m?m[1]:a;
}
function refId(a){
  if(!a) return null;
  var m=a.match(/^#(\d+)$/); return m?m[1]:null;
}

// ============================================================
// VERIFICACIONES
// ============================================================
function resolverCoordenadas(inst, texto) {
  if (!inst) return null;
  var raw = extraerRaw(texto, inst.pos);
  var attrs = splitAttrs(raw);
  var placementRef = null;
  for (var i=3; i<=6 && i<attrs.length; i++) {
    var rid = refId(attrs[i]);
    if (rid && instancias[rid] && instancias[rid].cls === "IFCLOCALPLACEMENT") {
      placementRef = rid; break;
    }
  }
  if (!placementRef) return null;
  var lpInst = instancias[placementRef];
  if (!lpInst) return null;
  var lpRaw = extraerRaw(texto, lpInst.pos);
  var lpAttrs = splitAttrs(lpRaw);
  var ap3dRef = null;
  for (var i=0; i<lpAttrs.length; i++) {
    var rid = refId(lpAttrs[i]);
    if (rid && instancias[rid] && instancias[rid].cls === "IFCAXIS2PLACEMENT3D") {
      ap3dRef = rid; break;
    }
  }
  if (!ap3dRef) return null;
  var apInst = instancias[ap3dRef];
  if (!apInst) return null;
  var apRaw = extraerRaw(texto, apInst.pos);
  var apAttrs = splitAttrs(apRaw);
  var ptRef = refId(apAttrs[0]);
  if (!ptRef) return null;
  var ptInst = instancias[ptRef];
  if (!ptInst || ptInst.cls !== "IFCCARTESIANPOINT") return null;
  var ptRaw = extraerRaw(texto, ptInst.pos);
  var coords = ptRaw.replace(/[\(\)]/g,"").split(",").map(function(v){return parseFloat(v.trim())||0;});
  return {x:coords[0]||0, y:coords[1]||0, z:coords[2]||0};
}

var instancias = {};
function verificarOrigen(est) {
  instancias = est.instancias;
  var resultado = [];
  var tipos = ["IFCSITE","IFCBUILDING"];
  for (var t=0; t<tipos.length; t++) {
    var tipo = tipos[t];
    for (var id in est.instancias) {
      if (est.instancias[id].cls === tipo) {
        var coords = resolverCoordenadas(est.instancias[id], est.texto);
        var raw = extraerRaw(est.texto, est.instancias[id].pos);
        var attrs = splitAttrs(raw);
        var nombre = strVal(attrs[2]) || strVal(attrs[1]) || "(sin nombre)";
        var x=coords?coords.x:null, y=coords?coords.y:null, z=coords?coords.z:null;
        var ok = x===0 && y===0 && z===0;
        resultado.push({entidad:tipo, nombre:nombre, x:x!==null?x:"N/A", y:y!==null?y:"N/A", z:z!==null?z:"N/A", ok:ok});
        break;
      }
    }
  }
  return resultado;
}
function verificarNombres(est) {
  var resultado = [];
  var reglas = {IFCSITE:{largo:3,desc:"3 caracteres"}, IFCBUILDING:{largo:2,desc:"2 caracteres"}};
  for (var tipo in reglas) {
    for (var id in est.instancias) {
      if (est.instancias[id].cls === tipo) {
        var raw = extraerRaw(est.texto, est.instancias[id].pos);
        var attrs = splitAttrs(raw);
        var nombre = strVal(attrs[2]) || strVal(attrs[1]) || "";
        var largo = nombre.length;
        var ok = largo === reglas[tipo].largo;
        resultado.push({tipo:tipo, nombre:nombre, largo:largo, desc:"Debe tener "+reglas[tipo].desc, ok:ok});
        break;
      }
    }
  }
  return resultado;
}
function verificarNiveles(est) {
  var resultado = [];
  for (var id in est.instancias) {
    if (est.instancias[id].cls === "IFCBUILDINGSTOREY") {
      var raw = extraerRaw(est.texto, est.instancias[id].pos);
      var attrs = splitAttrs(raw);
      var nombre = strVal(attrs[2]) || strVal(attrs[1]) || "";
      resultado.push({id:"#"+id, nombre:nombre, largo:nombre.length, ok:nombre.length===5});
    }
  }
  return resultado;
}
function obtenerNoClasificados(conteo) {
  var clsEsp = {};
  for (var k in ESP) { for (var i=0; i<ESP[k].ents.length; i++) clsEsp[ESP[k].ents[i][0]]=1; }
  var nc = [], comp = [];
  for (var cls in conteo) {
    if (!clsEsp[cls]) {
      if (COMP[cls]) comp.push([cls, COMP[cls], conteo[cls]]);
      else nc.push([cls, conteo[cls]]);
    }
  }
  nc.sort(function(a,b){return b[1]-a[1];});
  return {nc:nc, comp:comp};
}
function verificarClasificacion(est) {
  var total=0, con_clas=0, codigos={};
  var reRel = /IFCRELASSOCIATESCLASSIFICATION\s*\(/gi, m;
  while ((m = reRel.exec(est.texto)) !== null) {
    var raw = extraerRaw(est.texto, m.index + m[0].length);
    var attrs = splitAttrs(raw);
    var setRef = refId(attrs[5]);
    var code = null, system = null;
    if (setRef && est.instancias[setRef]) {
      var csRaw = extraerRaw(est.texto, est.instancias[setRef].pos);
      var csAttrs = splitAttrs(csRaw);
      code   = strVal(csAttrs[0]) || strVal(csAttrs[4]);
      system = strVal(csAttrs[1]);
    }
    if (!code) continue;
    var related = attrs[4];
    var reRef = /#(\d+)/g, rm;
    while ((rm = reRef.exec(related)) !== null) {
      total++;
      con_clas++;
      if (!codigos[code]) codigos[code]={codigo:code,sistema:system,cantidad:0};
      codigos[code].cantidad++;
    }
  }
  var codArr = Object.values ? Object.values(codigos) : Object.keys(codigos).map(function(k){return codigos[k];});
  codArr.sort(function(a,b){return b.cantidad-a.cantidad;});
  return {total:total, con_clas:con_clas, codigos:codArr};
}

    +"<div class='card'><div class='numero'>"+totalEsp+"</div><div class='label'>Total elementos</div></div></div>"
    +hOrigen(rOrg)+hNombres(rNom)+hNiveles(rNiv)

    +secNoRev+secNc+secComp+hClas(rCla)
    +"<div class='footer'>Creado por Carlos Estay Ruggieri</div></body></html>";

// ============================================================
// VISOR 3D — IFCjs + Three.js
// ============================================================
var viewer3D = {
  ifcAPI: null,
  modelID: null,
  renderer: null,
  scene: null,
  camera: null,
  controls: null,
  animFrame: null,
  ready: false,
  loading: false,
  idsEsp: [],       // expressIDs de la especialidad (azul)
  matEsp: null,
  matBase: null,
  subEsp: null,
  subBase: null,

  init: function() {
    if (this.renderer) return;
    var canvas = document.getElementById('canvas3d');

    // Renderer
    this.renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    this.renderer.setClearColor(0x1a1a2e);

    // Scene
    this.scene = new THREE.Scene();

    // Luz
    var ambient = new THREE.AmbientLight(0xffffff, 0.6);
    this.scene.add(ambient);
    var dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(50, 100, 50);
    this.scene.add(dir);

    // Camera
    this.camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 5000);
    this.camera.position.set(20, 20, 20);

    // Controls
    this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.07;

    // Resize
    var self = this;
    window.addEventListener('resize', function() { self.onResize(); });

    // Materiales
    this.matEsp = new THREE.MeshLambertMaterial({color: 0x2196f3, side: THREE.DoubleSide});
    this.matBase = new THREE.MeshLambertMaterial({color: 0x888888, transparent: true, opacity: 0.18, side: THREE.DoubleSide});

    this.animate();
  },

  animate: function() {
    var self = this;
    this.animFrame = requestAnimationFrame(function(){ self.animate(); });
    if (this.controls) this.controls.update();
    if (this.renderer && this.scene && this.camera) {
      this.renderer.render(this.scene, this.camera);
    }
  },

  onResize: function() {
    var canvas = document.getElementById('canvas3d');
    if (!canvas || !this.renderer) return;
    var w = canvas.clientWidth, h = canvas.clientHeight;
    this.renderer.setSize(w, h);
    if (this.camera) { this.camera.aspect = w/h; this.camera.updateProjectionMatrix(); }
  },

  setOverlay: function(msg) {
    var el = document.getElementById('viewer-overlay');
    if (msg) { el.textContent = msg; el.style.display = 'block'; }
    else { el.style.display = 'none'; }
  },

  cargarModelo: async function(buffer, idsEspecialidad) {
    if (this.loading) return;
    this.loading = true;
    this.idsEsp = idsEspecialidad || [];
    this.setOverlay('Cargando modelo 3D...');

    try {
      // Cargar e inicializar web-ifc si aún no está listo
      if (!this.ifcAPI) {
        // Cargar via script type=module (único método que funciona con ESM)
        if (!window._IfcAPI && window._loadWebIfc) {
          await window._loadWebIfc();
        }
        if (!window._IfcAPI) {
          throw new Error('No se pudo cargar web-ifc. Asegúrate de haber subido js/web-ifc-api.js al repositorio.');
        }
        var api = new window._IfcAPI();
        // WASM: intentar local primero, luego CDN
        var wasmBase = 'https://cdn.jsdelivr.net/npm/web-ifc@0.0.68/';
        try {
          var wr = await fetch('./wasm/web-ifc.wasm', {method:'HEAD'});
          if (wr.ok) wasmBase = './wasm/';
        } catch(e) {}
        api.SetWasmPath(wasmBase);
        await api.Init();
        this.ifcAPI = api;
      }

      // Limpiar escena anterior
      if (this.modelID !== null) {
        try { this.ifcAPI.CloseModel(this.modelID); } catch(e){}
        this.modelID = null;
      }
      // Limpiar meshes
      var toRemove = [];
      this.scene.traverse(function(obj){ if(obj.isMesh) toRemove.push(obj); });
      toRemove.forEach(function(obj){ obj.geometry.dispose(); obj.parent.remove(obj); });

      // Cargar modelo
      var data = new Uint8Array(buffer);
      this.modelID = this.ifcAPI.OpenModel(data, {COORDINATE_TO_ORIGIN: true, OPTIMIZE_PROFILES: false});

      // Set de IDs de especialidad para lookup O(1)
      var espSet = {};
      for (var i=0; i<this.idsEsp.length; i++) espSet[this.idsEsp[i]] = true;

      this.setOverlay('Generando geometría...');

      var self = this;
      var posEsp = [], normEsp = [], posBase = [], normBase = [];
      var bbox = new THREE.Box3();

      // Detectar qué API expone web-ifc en esta versión
      var geomApiStyle = null; // se detecta en el primer geom válido

      this.ifcAPI.StreamAllMeshes(this.modelID, function(mesh) {
        var placedGeoms = mesh.geometries;
        var isEsp = !!espSet[mesh.expressID];
        var target = isEsp ? {pos:posEsp, norm:normEsp} : {pos:posBase, norm:normBase};

        for (var g=0; g<placedGeoms.size(); g++) {
          var placedGeom = placedGeoms.get(g);
          if (!placedGeom || !placedGeom.geometryExpressID) continue;

          var geom;
          try { geom = self.ifcAPI.GetGeometry(self.modelID, placedGeom.geometryExpressID); }
          catch(e) { continue; }
          if (!geom) continue;

          var verts, indices;

          // Detectar estilo de API una sola vez
          if (!geomApiStyle) {
            if (typeof geom.GetIndexSize === 'function') geomApiStyle = 'methods';
            else if (geom.indexData !== undefined)       geomApiStyle = 'props';
            else                                         geomApiStyle = 'unknown';
            console.log('web-ifc geom API style:', geomApiStyle, Object.keys(geom));
          }

          try {
            if (geomApiStyle === 'methods') {
              verts   = self.ifcAPI.GetVertexArray(geom.GetVertexData(), geom.GetVertexDataSize());
              indices = self.ifcAPI.GetIndexArray(geom.GetIndexData(), geom.GetIndexSize());
            } else if (geomApiStyle === 'props') {
              verts   = geom.vertexData;
              indices = geom.indexData;
            } else {
              // Intentar ambos
              var keys = Object.keys(geom);
              var vKey = keys.find(function(k){ return k.toLowerCase().includes('vertex'); });
              var iKey = keys.find(function(k){ return k.toLowerCase().includes('index'); });
              verts   = vKey ? geom[vKey] : null;
              indices = iKey ? geom[iKey] : null;
            }
          } catch(e) {
            if (geom.delete) geom.delete();
            continue;
          }

          if (!verts || !indices || !indices.length) {
            if (geom.delete) geom.delete();
            continue;
          }

          var matrix = new THREE.Matrix4().fromArray(placedGeom.flatTransformation);
          var normalMatrix = new THREE.Matrix3().getNormalMatrix(matrix);

          for (var idx=0; idx<indices.length; idx++) {
            var vi = indices[idx] * 6;
            var v = new THREE.Vector3(verts[vi], verts[vi+1], verts[vi+2]).applyMatrix4(matrix);
            bbox.expandByPoint(v);
            target.pos.push(v.x, v.y, v.z);
            var n = new THREE.Vector3(verts[vi+3], verts[vi+4], verts[vi+5]).applyMatrix3(normalMatrix).normalize();
            target.norm.push(n.x, n.y, n.z);
          }
          if (geom.delete) geom.delete();
        }
      });

      // Crear meshes
      function buildMesh(pos, norm, mat) {
        if (pos.length === 0) return null;
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(pos), 3));
        geo.setAttribute('normal',   new THREE.Float32BufferAttribute(new Float32Array(norm), 3));
        return new THREE.Mesh(geo, mat);
      }

      var meshBase = buildMesh(posBase, normBase, this.matBase);
      var meshEsp  = buildMesh(posEsp,  normEsp,  this.matEsp);

      if (meshBase) this.scene.add(meshBase);
      if (meshEsp)  this.scene.add(meshEsp);

      // Centrar cámara
      if (!bbox.isEmpty()) {
        var center = new THREE.Vector3();
        bbox.getCenter(center);
        var size = new THREE.Vector3();
        bbox.getSize(size);
        var maxDim = Math.max(size.x, size.y, size.z);
        var fov = this.camera.fov * (Math.PI / 180);
        var dist = Math.abs(maxDim / Math.sin(fov/2)) * 0.7;
        this.camera.position.set(center.x + dist*0.6, center.y + dist*0.5, center.z + dist*0.6);
        this.controls.target.copy(center);
        this.controls.update();
      }

      var nEsp = posEsp.length/9, nBase = posBase.length/9;
      this.setOverlay(nEsp + ' triángulos especialidad · ' + nBase + ' resto');
      setTimeout(function(){ self.setOverlay(null); }, 3000);
      this.ready = true;

    } catch(err) {
      this.setOverlay('Error al cargar modelo: ' + err.message);
      console.error('IFC viewer error:', err);
    }
    this.loading = false;
  }
};

var currentMode = 'report';

function setMode(mode) {
  currentMode = mode;
  var frame   = document.getElementById('vframe');
  var canvas  = document.getElementById('canvas3d');
  var btnR    = document.getElementById('btnModeReport');
  var btnB    = document.getElementById('btnModeBoth');
  var btn3D   = document.getElementById('btnMode3D');

  // Resetear clases
  frame.classList.remove('show','split');
  canvas.classList.remove('show','split');
  btnR.classList.remove('active');
  btnB.classList.remove('active');
  btn3D.classList.remove('active');
  document.getElementById('viewContent').classList.remove('split-mode');

  if (mode === 'report') {
    frame.classList.add('show');
    btnR.classList.add('active');
  } else if (mode === '3d') {
    canvas.classList.add('show');
    btn3D.classList.add('active');
    viewer3D.init();
    viewer3D.onResize();
    if (pendingBuffer && !viewer3D.ready && !viewer3D.loading) {
      viewer3D.cargarModelo(pendingBuffer, pendingIdsEsp);
    }
  } else if (mode === 'both') {
    frame.classList.add('show','split');
    canvas.classList.add('show','split');
    btnB.classList.add('active');
    document.getElementById('viewContent').classList.add('split-mode');
    viewer3D.init();
    viewer3D.onResize();
    if (pendingBuffer && !viewer3D.ready && !viewer3D.loading) {
      viewer3D.cargarModelo(pendingBuffer, pendingIdsEsp);
    }
  }
}

// ============================================================
// FLUJO PRINCIPAL
// ============================================================
var selFile = null;
var pendingBuffer = null;
var pendingIdsEsp = [];

function log(msg,t){var el=document.getElementById("slog"),d=document.createElement("div");if(t)d.className="log-"+t;d.textContent=msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function prog(p){document.getElementById("pbar").style.width=p+"%";}

function poblarDropdown(){
  var sel=document.getElementById("selEsp");
  for(var k in ESP){
    var opt=document.createElement("option");
    opt.value=k; opt.textContent=ESP[k].cod+"\u2014"+k;
    sel.appendChild(opt);
  }
}

function actualizarEntidades(){
  var espNom=document.getElementById("selEsp").value;
  var block=document.getElementById("entsBlock");
  var lista=document.getElementById("entsList");
  if(!espNom){block.style.display="none";document.getElementById("btnGen").disabled=true;return;}
  var ents=ESP[espNom].ents;
  lista.innerHTML="";
  for(var i=0;i<ents.length;i++){
    (function(ent){
      var item=document.createElement("label");
      item.className="ent-item";
      var cb=document.createElement("input");
      cb.type="checkbox"; cb.checked=true; cb.value=ent[0];
      cb.addEventListener("change",validarSeleccion);
      var info=document.createElement("div");
      info.innerHTML="<div class='ent-name'>"+ent[1]+"</div><div class='ent-cls'>"+ent[0].charAt(0)+ent[0].slice(1).toLowerCase()+"</div>";
      item.appendChild(cb); item.appendChild(info);
      lista.appendChild(item);
    })(ents[i]);
  }
  block.style.display="block";
  validarSeleccion();
}

function validarSeleccion(){
  var cbs=document.querySelectorAll("#entsList input[type=checkbox]"),ok=false;
  for(var i=0;i<cbs.length;i++) if(cbs[i].checked){ok=true;break;}
  document.getElementById("btnGen").disabled=!ok;
}

function procesar(){
  var espNom=document.getElementById("selEsp").value; if(!espNom)return;
  var cbs=document.querySelectorAll("#entsList input[type=checkbox]");
  var entsSelec=[],allEnts=ESP[espNom].ents;
  for(var i=0;i<cbs.length;i++) if(cbs[i].checked)
    for(var j=0;j<allEnts.length;j++) if(allEnts[j][0]===cbs[i].value){entsSelec.push(allEnts[j]);break;}
  var entsNoRev=[];
  for(var j=0;j<allEnts.length;j++){
    var sel=false; for(var i=0;i<entsSelec.length;i++) if(entsSelec[i][0]===allEnts[j][0]){sel=true;break;}
    if(!sel) entsNoRev.push(allEnts[j]);
  }

  document.getElementById("sbox").classList.add("show");
  document.getElementById("spin").classList.add("show");
  document.getElementById("pwrap").classList.add("show");
  document.getElementById("slog").innerHTML="";
  document.getElementById("rlist").innerHTML="";
  document.getElementById("res").classList.remove("show");
  document.getElementById("btnGen").disabled=true;

  // Reset visor 3D para el nuevo modelo
  viewer3D.ready = false;
  pendingBuffer = null;
  pendingIdsEsp = [];

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var texto=e.target.result;
      log("Archivo leido ("+(texto.length/1024/1024).toFixed(1)+" MB).","ok"); prog(20);
      log("Parseando productos IFC...","info");
      var est=parsearIFC(texto);
      log("Especialidad: "+espNom+" | "+entsSelec.length+" entidades seleccionadas.","info"); prog(50);

      // Recoger expressIDs de las entidades seleccionadas para el visor
      var idsEsp = [];
      for(var i=0;i<entsSelec.length;i++){
        var cls = entsSelec[i][0];
        if(est.idsPorCls[cls]) idsEsp = idsEsp.concat(est.idsPorCls[cls]);
      }
      log("ExpressIDs para visor 3D: "+idsEsp.length+" elementos.","info"); prog(60);

      var mn=selFile.name,fecha=new Date().toLocaleString("es-CL");
      var html=generarHTML(espNom,entsSelec,entsNoRev,est,mn,fecha);
      var base=mn.replace(/\.[^.]+$/,"");
      var narch=base+"_"+espNom.replace(/[ /]/g,"_")+"_reporte.html";
      var total=0;
      for(var i=0;i<entsSelec.length;i++) total+=(est.conteo[entsSelec[i][0]]||0);
      var rep={nombre:espNom,narch:narch,html:html,total:total};
      prog(80);
      log("\u2714 "+narch+" ("+total+" elementos)","ok"); prog(100);
      document.getElementById("spin").classList.remove("show");
      document.getElementById("stitle").textContent="Listo";
      document.getElementById("res").classList.add("show");

      var card=document.createElement("div");
      card.className="rcard active";
      card.innerHTML="<div class='racc'></div><div class='rbody'><div class='rname'>"+rep.nombre+"</div><div class='rmeta'>"+rep.total+" elementos \u00b7 "+entsSelec.length+" entidades</div></div>";
      card.addEventListener("click",function(){
        mostrarReporte(rep);
        document.querySelectorAll(".rcard").forEach(function(c){c.classList.remove("active");});
        card.classList.add("active");
      });
      document.getElementById("rlist").appendChild(card);
      mostrarReporte(rep);

      // Guardar buffer IFC y IDs para cuando se active el visor 3D
      pendingIdsEsp = idsEsp;

    }catch(err){
      document.getElementById("spin").classList.remove("show");
      document.getElementById("stitle").textContent="Error al procesar";
      log("ERROR: "+err.message,"error"); console.error(err);
    }
    document.getElementById("btnGen").disabled=false;
  };

  // Leer como texto para el reporte
  var readerTxt = new FileReader();
  readerTxt.onload = function(e){
    // ya manejado arriba
  };
  log("Leyendo: "+selFile.name,"info"); prog(10);
  reader.readAsText(selFile,"UTF-8");

  // Leer como ArrayBuffer para el visor 3D (en paralelo)
  var readerBuf = new FileReader();
  readerBuf.onload = function(e){
    pendingBuffer = e.target.result;
    // Si el usuario ya cambió a modo 3D, iniciar carga
    if (currentMode === '3d') {
      viewer3D.init();
      viewer3D.cargarModelo(pendingBuffer, pendingIdsEsp);
    }
  };
  readerBuf.readAsArrayBuffer(selFile);
}

// ============================================================
// EVENTOS UI
// ============================================================
function handleFile(file){
  if(!file||!file.name.toLowerCase().endsWith(".ifc")){alert("Por favor selecciona un archivo .ifc");return;}
  selFile=file;
  document.getElementById("fname").textContent=file.name;
  document.getElementById("fmeta").textContent=(file.size/1024/1024).toFixed(1)+" MB";
  document.getElementById("finfo").classList.add("show");
  var cod=detectarCodigo(file.name),selEsp=document.getElementById("selEsp");
  if(cod){ for(var k in ESP){ if(ESP[k].cod===cod){selEsp.value=k;break;} } }
  else selEsp.value="";
  actualizarEntidades();
  document.getElementById("configBlock").style.display="flex";
  document.getElementById("sbox").classList.remove("show");
  document.getElementById("res").classList.remove("show");
  var fr=document.getElementById("vframe"),tb=document.getElementById("vtoolbar");
  fr.classList.remove("show"); fr.src="about:blank";
  tb.classList.remove("show");
  document.getElementById("vempty").style.display="";
  document.getElementById("rlist").innerHTML="";
  if(typeof currentBlobUrl!=="undefined"&&currentBlobUrl){URL.revokeObjectURL(currentBlobUrl);currentBlobUrl=null;}
  pendingBuffer=null; pendingIdsEsp=[]; viewer3D.ready=false;
}

poblarDropdown();
var drop=document.getElementById("drop"),fi=document.getElementById("fi");
fi.addEventListener("change",function(e){handleFile(e.target.files[0]);});
drop.addEventListener("dragover",function(e){e.preventDefault();drop.classList.add("over");});
drop.addEventListener("dragleave",function(){drop.classList.remove("over");});
drop.addEventListener("drop",function(e){e.preventDefault();drop.classList.remove("over");handleFile(e.dataTransfer.files[0]);});
document.getElementById("selEsp").addEventListener("change",actualizarEntidades);
document.getElementById("btnAll").addEventListener("click",function(){
  document.querySelectorAll("#entsList input[type=checkbox]").forEach(function(c){c.checked=true;});
  validarSeleccion();
});
document.getElementById("btnNone").addEventListener("click",function(){
  document.querySelectorAll("#entsList input[type=checkbox]").forEach(function(c){c.checked=false;});
  validarSeleccion();
});
document.getElementById("btnGen").addEventListener("click",procesar);

// ============================================================
// VISOR REPORTE (iframe)
// ============================================================
var currentBlobUrl = null;

function mostrarReporte(rep) {
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  var blob = new Blob([rep.html], {type:"text/html;charset=utf-8"});
  currentBlobUrl = URL.createObjectURL(blob);
  var frame   = document.getElementById("vframe");
  var toolbar = document.getElementById("vtoolbar");
  document.getElementById("vtitle").textContent = rep.nombre;
  frame.src = currentBlobUrl;
  toolbar.classList.add("show");
  // Mostrar en modo reporte
  setMode('report');
  frame.classList.add("show");
  document.getElementById("vempty").style.display = "none";
  document.getElementById("vbtnDl").onclick = function(){
    var a = document.createElement("a");
    a.href = currentBlobUrl; a.download = rep.narch; a.click();
  };
}
</script>
<script type="module">
// Cargar web-ifc como ESM (único formato disponible) y exponer globalmente
// Se precarga al cargar la página para que esté listo cuando el usuario lo necesite
async function loadWebIfc() {
  if (window._IfcAPI) return; // ya cargado
  var urls = [
    './js/web-ifc-api.js',
    'https://cdn.jsdelivr.net/npm/web-ifc@0.0.68/web-ifc-api.js',
    'https://unpkg.com/web-ifc@0.0.68/web-ifc-api.js'
  ];
  for (var i = 0; i < urls.length; i++) {
    try {
      var mod = await import(urls[i]);
      var IfcAPI = mod.IfcAPI || (mod.default && mod.default.IfcAPI);
      if (IfcAPI) {
        window._IfcAPI = IfcAPI;
        console.log('web-ifc cargado desde:', urls[i]);
        return;
      }
    } catch(e) {
      console.log('Fallo cargando web-ifc desde:', urls[i], e.message);
    }
  }
  console.warn('No se pudo cargar web-ifc desde ninguna fuente');
}
// Exponer para que cargarModelo pueda llamarlo
window._loadWebIfc = loadWebIfc;
// Precargar inmediatamente (en segundo plano)
loadWebIfc();
</script>
